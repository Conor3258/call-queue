<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Call Queue</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #ffffff;
      font-family: Arial, sans-serif;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #ffffff;
    }
    #fallback {
      display: none;
      position: fixed;
      inset: 0;
      padding: 24px;
      box-sizing: border-box;
      background: #ffffff;
      color: #222;
    }
    #fallback a {
      display: inline-block;
      margin-top: 12px;
      padding: 10px 16px;
      background: #6264A7;
      color: #fff;
      text-decoration: none;
      border-radius: 6px;
    }
    #fallback small {
      display: block;
      margin-top: 12px;
      color: #666;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <iframe id="queueFrame" src="https://portal.hostedpbx.ie/#/apps/callcenter/callcenter/queues?view=table" allow="microphone; camera; clipboard-read; clipboard-write"></iframe>
  <div id="fallback">
    <h2>Call Queue could not be displayed inside Teams</h2>
    <p>The HostedPBX page may be blocking iframe embedding on desktop Teams. Use the link below to open it in the browser.</p>
    <a href="https://portal.hostedpbx.ie/#/apps/callcenter/callcenter/queues?view=table" target="_blank" rel="noopener noreferrer">Open Call Queue in browser</a>
    <small>https://portal.hostedpbx.ie/#/apps/callcenter/callcenter/queues?view=table</small>
  </div>
  <script>
    setTimeout(function () {
      document.getElementById('fallback').style.display = 'block';
    }, 6000);
  </script>
</body>
</html>
